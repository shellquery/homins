name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npx next build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Select latest Xcode
        run: |
          # Use latest available Xcode for best iOS 26 compatibility
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Resolve Swift packages
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -resolvePackageDependencies

      - name: Build iOS app
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            IPHONEOS_DEPLOYMENT_TARGET=16.0

      - name: Install ldid and fakesign binaries
        run: |
          # Install ldid for pseudo-signing (fixes __LINKEDIT segment issues)
          brew install ldid

          # Find the .app
          APP_PATH="build/App.xcarchive/Products/Applications/App.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d | head -1)
          fi

          # Fakesign main binary and all frameworks
          echo "Fakesigning main binary..."
          ldid -S "$APP_PATH/App"

          for fw in "$APP_PATH/Frameworks/"*.framework; do
            FW_NAME=$(basename "$fw" .framework)
            if [ -f "$fw/$FW_NAME" ]; then
              echo "Fakesigning framework: $FW_NAME"
              ldid -S "$fw/$FW_NAME"
            fi
          done
          echo "✅ All binaries fakesigned"

      - name: Verify and package IPA
        run: |
          APP_PATH="build/App.xcarchive/Products/Applications/App.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build -name "*.app" -type d | head -1)
          fi
          echo "App at: $APP_PATH"

          # Verify web assets
          if [ -f "$APP_PATH/public/index.html" ]; then
            echo "✅ Web assets OK"
            echo "Pages: $(find $APP_PATH/public -name 'index.html' | wc -l)"
          else
            echo "❌ Web assets missing!"
            ls -R "$APP_PATH/" | head -30
            exit 1
          fi

          # Create proper IPA structure
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/App.app

          # Create IPA
          zip -r HI-Exam-Prep.ipa Payload
          rm -rf Payload

          echo "IPA size: $(du -h HI-Exam-Prep.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: HI-Exam-Prep-iOS
          path: HI-Exam-Prep.ipa
          retention-days: 30
